spring.application.name=QUIZSERVICE
server.port = 8081


spring.datasource.url = jdbc:mysql://localhost:3306/microservice
spring.datasource.username = root
spring.datasource.password = 1234

spring.jpa.show-sql=true
#allows the java code to automatically create table in database using the entity defined in the code
spring.jpa.hibernate.ddl-auto =update

#eureka.instance.client.serverUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/


# Micrometer + Zipkin
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.tracing.sampling.probability=1.0
logging.pattern.console=%d{HH:mm:ss} [%X{traceId},%X{spanId}] %-5level %logger{36} - %msg%n
management.endpoints.web.exposure.include=*

#management.server.port=8081
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost




